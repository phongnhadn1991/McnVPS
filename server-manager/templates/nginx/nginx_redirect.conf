# This file contains critical Nginx configurations for your website.
# Modifying it for any reason may break your site.
# PLEASE DO NOT REMOVE FLAGS STARTING WITH #.

server {
    listen 80;
    listen [::]:80;

    listen       443 quic;
    listen       443 ssl;
    listen       [::]:443 quic;
    listen       [::]:443 ssl;
    http2 on;
    http3 on;
    quic_retry on;

    #SERVER_NAME
    server_name  __DOMAIN__ www.__DOMAIN__;

    #NGINX_LOG
    access_log  off;
    error_log off;

    #SSL_CERT
    ssl_certificate         /etc/nginx/ssl/default/server.crt;
    ssl_certificate_key     /etc/nginx/ssl/default/server.key;

    #DOCUMENT_ROOT
    root   /var/www/html;

    index index.html index.htm;

    include /etc/nginx/well-known.conf;

    location / {
        #return 301 http://DOMAIN_REDIRECT_TO;
        rewrite ^ $scheme://__DOMAIN_REDIRECT_TO__$request_uri? permanent;
    }
}
