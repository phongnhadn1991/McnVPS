# This file contains critical Nginx configurations for your website.
# Modifying it for any reason may break your site.
# PLEASE DO NOT REMOVE FLAGS STARTING WITH #.

#INIT_FASTCGI_CACHE

server {
    listen       80;
    listen       [::]:80;

    #SERVER_NAME
    server_name  __DOMAIN__ www.__DOMAIN__;

    #DOCUMENT_ROOT
    root   __DOCUMENT_ROOT__;

    index index.php index.html index.htm;

    #NGINX_LOG
    access_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/access/access.log main;
    error_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/errors/error.log;

    if ($host !~* ^(__DOMAIN__(:[0-9]+)?|www.__DOMAIN__(:[0-9]+)?)$) {
        return 404;
    }

    if ($is_bad_ua = 1) {
        return 444;
    }

    include /etc/nginx/well-known.conf;

    if ($block_sensitive_files = 1) {
        return 444;
    }

    location ~ (/vendor/|/node_modules/|composer\.json|/readme|/README|readme\.txt|/upgrade\.txt|/UPGRADING\.md|db/install\.xml|/fixtures/|/behat/|phpunit\.xml|\.lock|environment\.xml) {
        return 444;
    }

    location / {
        #TRY_FILES
        try_files $uri $uri/ /r.php;
    }

    location ~ \.php(/|$) {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include /etc/nginx/fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        #BEGIN_FASTCGI_CACHE
        #END_FASTCGI_CACHE

        include /etc/nginx/nginx_limits.conf;

        if (-f $request_filename) {
            fastcgi_pass unix:__PHP_SOCKET__;
        }
    }

    #HTTPS_STATIC_FILES
}

server {
    listen       443 quic;
    listen       443 ssl;
    listen       [::]:443 quic;
    listen       [::]:443 ssl;
    http2 on;
    http3 on;
    quic_retry on;

    #SERVER_NAME
    server_name  __DOMAIN__ www.__DOMAIN__;

    #NGINX_LOG
    access_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/access/access.log main;
    error_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/errors/error.log;

    #SSL_CERT
    ssl_certificate         /etc/nginx/ssl/default/server.crt;
    ssl_certificate_key     /etc/nginx/ssl/default/server.key;

    #DOCUMENT_ROOT
    root   __DOCUMENT_ROOT__;

    if ($host !~* ^(__DOMAIN__(:[0-9]+)?|www.__DOMAIN__(:[0-9]+)?)$) {
        return 404;
    }

    if ($is_bad_ua = 1) {
        return 444;
    }

    include /etc/nginx/well-known.conf;

    if ($block_sensitive_files = 1) {
        return 444;
    }

    #HTTP_TO_HTTPS

    location ~ (/vendor/|/node_modules/|composer\.json|/readme|/README|readme\.txt|/upgrade\.txt|/UPGRADING\.md|db/install\.xml|/fixtures/|/behat/|phpunit\.xml|\.lock|environment\.xml) {
        return 444;
    }

    location / {
        #HTTP3_ALT_HEADER
        #TRY_FILES
        add_header Early-Data $ssl_early_data;
        try_files $uri $uri/ /r.php;
    }

    location ~ \.php(/|$) {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include /etc/nginx/fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        #HTTP3_ALT_HEADER
        add_header Early-Data $ssl_early_data;

        #BEGIN_FASTCGI_CACHE
        #END_FASTCGI_CACHE

        include /etc/nginx/nginx_limits.conf;

        if (-f $request_filename) {
            fastcgi_pass unix:__PHP_SOCKET__;
        }
    }

    #HTTPS_STATIC_FILES
}
