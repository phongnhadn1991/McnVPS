# This file contains critical Nginx configurations for your website.
# Modifying it for any reason may break your site.
# PLEASE DO NOT REMOVE FLAGS STARTING WITH #.

#INIT_FASTCGI_CACHE

server {
    listen       80;
    listen       [::]:80;

    #SERVER_NAME
    server_name  __DOMAIN__ www.__DOMAIN__;

    #DOCUMENT_ROOT
    root   __DOCUMENT_ROOT__;

    index index.php index.html index.htm;

    #NGINX_LOG
    access_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/access/access.log main;
    error_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/errors/error.log;

    if ($host !~* ^(__DOMAIN__(:[0-9]+)?|www.__DOMAIN__(:[0-9]+)?)$) {
        return 404;
    }

    if ($is_bad_ua = 1) {
        return 444;
    }

    include /etc/nginx/well-known.conf;

    if ($block_sensitive_files = 1) {
        return 444;
    }

    location / {
        if ( $http_user_agent ~ ^DavClnt ) {
            return 302 /remote.php/webdav/$is_args$args;
        }

        #TRY_FILES
        try_files $uri $uri/ /index.php$request_uri;
    }

    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/)  { return 404; }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console)                { return 404; }

    location ~ \.php(?:$|/) {
        # Required for legacy support
        rewrite ^/(?!index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|ocs-provider\/.+|.+\/richdocumentscode(_arm64)?\/proxy) /index.php$request_uri;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;

        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;

        fastcgi_param modHeadersAvailable true;         # Avoid sending the security headers twice
        fastcgi_param front_controller_active true;     # Enable pretty urls

        if (-f $request_filename) {
            fastcgi_pass unix:__PHP_SOCKET__;
        }

        fastcgi_intercept_errors on;
        fastcgi_request_buffering on;

        #BEGIN_FASTCGI_CACHE
        #END_FASTCGI_CACHE

        include /etc/nginx/nginx_limits.conf;

        # PHP-FPM 504 response timeouts
        # Uncomment and increase these if facing timeout errors during large file uploads
        #fastcgi_connect_timeout 600s;

        fastcgi_max_temp_file_size 0;
    }

    location ~ \.(?:css|js|mjs|svg|gif|ico|jpg|png|webp|wasm|tflite|map|ogg|flac)$ {
        try_files $uri /index.php$request_uri;
        # HTTP response headers borrowed from Nextcloud `.htaccess`
        add_header Cache-Control                     "public, max-age=15778463$asset_immutable";
        add_header Referrer-Policy                   "no-referrer"       always;
        add_header X-Content-Type-Options            "nosniff"           always;
        add_header X-Frame-Options                   "SAMEORIGIN"        always;
        add_header Content-Security-Policy "frame-ancestors 'self';";
        add_header X-Permitted-Cross-Domain-Policies "none"              always;
        add_header X-Robots-Tag                      "noindex, nofollow" always;
        access_log off;     # Optional: Don't log access to assets
    }

    location ~ \.(otf|woff2?)$ {
        try_files $uri /index.php$request_uri;
        expires 365d;         # Cache-Control policy borrowed from `.htaccess`
        access_log off;     # Optional: Don't log access to assets
    }

    # Rule borrowed from `.htaccess`
    location /remote {
        return 301 /remote.php$request_uri;
    }
}

server {
    listen       443 quic;
    listen       443 ssl;
    listen       [::]:443 quic;
    listen       [::]:443 ssl;
    http2 on;
    http3 on;
    quic_retry on;

    #SERVER_NAME
    server_name  __DOMAIN__ www.__DOMAIN__;

    #DOCUMENT_ROOT
    root   __DOCUMENT_ROOT__;

    index index.php index.html index.htm;

    #NGINX_LOG
    access_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/access/access.log main;
    error_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/errors/error.log;

    if ($host !~* ^(__DOMAIN__(:[0-9]+)?|www.__DOMAIN__(:[0-9]+)?)$) {
        return 404;
    }

    if ($is_bad_ua = 1) {
        return 444;
    }

    include /etc/nginx/well-known.conf;

    if ($block_sensitive_files = 1) {
        return 444;
    }

    #HTTP_TO_HTTPS

    location / {
        #HTTP3_ALT_HEADER
        add_header Early-Data $ssl_early_data;

        if ( $http_user_agent ~ ^DavClnt ) {
            return 302 /remote.php/webdav/$is_args$args;
        }

        #TRY_FILES
        try_files $uri $uri/ /index.php$request_uri;
    }

    location ~ ^/(?:build|tests|config|lib|3rdparty|templates|data)(?:$|/)  { return 404; }
    location ~ ^/(?:\.|autotest|occ|issue|indie|db_|console)                { return 404; }

    location ~ \.php(?:$|/) {
        #HTTP3_ALT_HEADER
        add_header Early-Data $ssl_early_data;

        # Required for legacy support
        rewrite ^/(?!index|remote|public|cron|core\/ajax\/update|status|ocs\/v[12]|updater\/.+|ocs-provider\/.+|.+\/richdocumentscode(_arm64)?\/proxy) /index.php$request_uri;

        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        set $path_info $fastcgi_path_info;

        try_files $fastcgi_script_name =404;

        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $path_info;
        fastcgi_param HTTPS on;

        fastcgi_param modHeadersAvailable true;         # Avoid sending the security headers twice
        fastcgi_param front_controller_active true;     # Enable pretty urls

        if (-f $request_filename) {
            fastcgi_pass unix:__PHP_SOCKET__;
        }

        fastcgi_intercept_errors on;
        fastcgi_request_buffering on;

        #BEGIN_FASTCGI_CACHE
        #END_FASTCGI_CACHE

        include /etc/nginx/nginx_limits.conf;

        # PHP-FPM 504 response timeouts
        # Uncomment and increase these if facing timeout errors during large file uploads
        #fastcgi_connect_timeout 600s;

        fastcgi_max_temp_file_size 0;
    }

    location ~ \.(?:css|js|mjs|svg|gif|ico|jpg|png|webp|wasm|tflite|map|ogg|flac)$ {
        try_files $uri /index.php$request_uri;
        # HTTP response headers borrowed from Nextcloud `.htaccess`
        add_header Cache-Control                     "public, max-age=15778463$asset_immutable";
        add_header Referrer-Policy                   "no-referrer"       always;
        add_header X-Content-Type-Options            "nosniff"           always;
        add_header X-Frame-Options                   "SAMEORIGIN"        always;
        add_header Content-Security-Policy "frame-ancestors 'self';";
        add_header X-Permitted-Cross-Domain-Policies "none"              always;
        add_header X-Robots-Tag                      "noindex, nofollow" always;
        access_log off;     # Optional: Don't log access to assets
    }

    location ~ \.(otf|woff2?)$ {
        try_files $uri /index.php$request_uri;
        expires 365d;         # Cache-Control policy borrowed from `.htaccess`
        access_log off;     # Optional: Don't log access to assets
    }

    # Rule borrowed from `.htaccess`
    location /remote {
        return 301 /remote.php$request_uri;
    }
}

