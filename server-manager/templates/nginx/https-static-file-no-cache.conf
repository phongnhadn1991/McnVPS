location = /favicon.ico { allow all; log_not_found off; }
location = /robots.txt { allow all; log_not_found off; }

location ~* \.(?:css(\.map)?|js(\.map)?)(\?(ver|v|t)=[a-zA-Z0-9]+)?$ {
    #access_log off;
    log_not_found off;
    etag on;
    expires 365d;

    #add_header Access-Control-Allow-Origin *;
    add_header Early-Data $ssl_early_data;
    add_header Alt-Svc 'h3=":$server_port"; ma=2592000';
    more_clear_headers Cache-Control;
    add_header Cache-Control "public, must-revalidate, proxy-revalidate, immutable, stale-while-revalidate=86400, stale-if-error=604800";
    #HTTP3_ALT_HEADER
    #HSLS_HEADER
    break;
}

location ~* \.(jpeg|jpg|png|gif|ico|webp|avif)(\?(ver|v|t)=[a-zA-Z0-9]+)?$ {
    #access_log off;
    log_not_found off;
    gzip_static off;
    brotli_static off;
    etag on;
    expires 365d;

    #add_header Access-Control-Allow-Origin *;
    add_header Early-Data $ssl_early_data;
    add_header Alt-Svc 'h3=":$server_port"; ma=2592000';
    more_clear_headers Cache-Control;
    add_header Cache-Control "public, must-revalidate, proxy-revalidate, immutable, stale-while-revalidate=86400, stale-if-error=604800";
    #HTTP3_ALT_HEADER
    #HSLS_HEADER
    break;
}

location ~* \.(svg|svgz|woff|woff2|ttc|otf|eot|ttf)(\?(ver|v|t)=[a-zA-Z0-9]+)?$ {
    #access_log off;
    log_not_found off;
    gzip_static off;
    brotli_static off;
    etag on;
    expires 365d;

    #add_header Access-Control-Allow-Origin *;
    add_header Early-Data $ssl_early_data;
    add_header Alt-Svc 'h3=":$server_port"; ma=2592000';
    more_clear_headers Cache-Control;
    add_header Cache-Control "public, must-revalidate, proxy-revalidate";
    #HTTP3_ALT_HEADER
    #HSLS_HEADER
    break;
}

location ~* \.(3gp|wmv|avi|asf|asx|mpg|mpeg|mp4|pls|mp3|mid|wav|swf|flv|exe|zip|tar|rar|gz|tgz|bz2|uha|7z|doc|docx|xls|xlsx|pdf|iso)$ {
    #access_log off;
    log_not_found off;
    gzip_static off;
    brotli_static off;
    sendfile off;
    sendfile_max_chunk 1m;

    #add_header Access-Control-Allow-Origin *;
    add_header Early-Data $ssl_early_data;
    more_clear_headers Cache-Control;
    add_header Alt-Svc 'h3=":$server_port"; ma=2592000';
    add_header Cache-Control "public, must-revalidate, proxy-revalidate, immutable, stale-while-revalidate=86400, stale-if-error=604800";
    expires 365d;
    #HTTP3_ALT_HEADER
    #HSLS_HEADER
    break;
}
