# This file contains critical Nginx configurations for your website.
# Modifying it for any reason may break your site.
# PLEASE DO NOT REMOVE FLAGS STARTING WITH #.

#INIT_FASTCGI_CACHE

server {
    listen       80;
    listen       [::]:80;

    #SERVER_NAME
    server_name  __DOMAIN__ www.__DOMAIN__;

    #DOCUMENT_ROOT
    root   __DOCUMENT_ROOT__;

    set $MAGE_DEBUG_SHOW_ARGS 1;
    set $MAGE_ROOT /home/__OWNER_FOLDER__/__DOMAIN__/public_html;

    index index.php index.html index.htm;
    error_page 404 403 = /errors/404.php;

    #NGINX_LOG
    access_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/access/access.log main;
    error_log /home/__OWNER_FOLDER__/__DOMAIN__/logs/errors/error.log;

    if ($host !~* ^(__DOMAIN__(:[0-9]+)?|www.__DOMAIN__(:[0-9]+)?)$) {
        return 404;
    }

    if ($is_bad_ua = 1) {
        return 444;
    }

    include /etc/nginx/well-known.conf;

    if ($block_sensitive_files = 1) {
        return 444;
    }

    #HTTP_TO_HTTPS

    #SEO_SITE_MAP

    # PHP entry point for setup application
    location ~* ^/setup($|/) {
        root $MAGE_ROOT;

        location ~ ^/setup/index.php {
            try_files $uri =404;

            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include /etc/nginx/fastcgi_params;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            include /etc/nginx/nginx_limits.conf;

            if (-f $request_filename) {
                fastcgi_pass unix:__PHP_SOCKET__;
            }
        }

        location ~ ^/setup/(?!pub/). {
            access_log off;
            log_not_found off;
            return 444;
        }

        location ~ ^/setup/pub/ {
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self';";
        }
    }

    # PHP entry point for update application
    location ~* ^/update($|/) {
        root $MAGE_ROOT;

        location ~ ^/update/index.php {
            try_files $uri =404;

            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            include /etc/nginx/fastcgi_params;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

            include /etc/nginx/nginx_limits.conf;

            if (-f $request_filename) {
                fastcgi_pass unix:__PHP_SOCKET__;
            }
        }

        # Deny everything but index.php
        location ~ ^/update/(?!pub/). {
            access_log off;
            log_not_found off;
            return 444;
        }

        location ~ ^/update/pub/ {
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self';";
        }
    }

    location / {
        #TRY_FILES
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location /pub/ {
        location ~ ^/pub/media/(downloadable|customer|import|custom_options|theme_customization/.*.xml) {
            access_log off;
            log_not_found off;
            return 444;
        }

        alias $MAGE_ROOT/pub/;
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Content-Security-Policy "frame-ancestors 'self';";
    }

    location /static/ {
        # Uncomment the following line in production mode
        # expires max;

        # Remove signature of the static files that is used to overcome the browser cache
        location ~ ^/static/version {
            rewrite ^/static/(versiond*/)?(.*)$ /static/$2 last;
        }

        location ~* .(ico|jpg|jpeg|png|gif|svg|js|css|swf|eot|ttf|otf|woff|woff2|html|json)$ {
            add_header Cache-Control "public";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self';";
            expires +1y;

            if (!-f $request_filename) {
                rewrite ^/static/(versiond*/)?(.*)$ /static.php?resource=$2 last;
            }
        }
        location ~* .(zip|gz|gzip|bz2|csv|xml)$ {
            add_header Cache-Control "no-store";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self';";
            expires    off;

            if (!-f $request_filename) {
               rewrite ^/static/(versiond*/)?(.*)$ /static.php?resource=$2 last;
            }
        }

        if (!-f $request_filename) {
            rewrite ^/static/(versiond*/)?(.*)$ /static.php?resource=$2 last;
        }

        add_header X-Frame-Options "SAMEORIGIN";
        add_header Content-Security-Policy "frame-ancestors 'self';";
    }

    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;

        location ~ ^/media/theme_customization/.*.xml {
            access_log off;
            log_not_found off;
            return 444;
        }

        location ~* .(ico|jpg|jpeg|png|gif|svg|js|css|swf|eot|ttf|otf|woff|woff2)$ {
            add_header Cache-Control "public";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self';";
            expires +1y;
            try_files $uri $uri/ /get.php$is_args$args;
        }
        location ~* .(zip|gz|gzip|bz2|csv|xml)$ {
            add_header Cache-Control "no-store";
            add_header X-Frame-Options "SAMEORIGIN";
            add_header Content-Security-Policy "frame-ancestors 'self';";
            expires    off;
            try_files $uri $uri/ /get.php$is_args$args;
        }
        add_header X-Frame-Options "SAMEORIGIN";
        add_header Content-Security-Policy "frame-ancestors 'self';";
    }

    location /media/customer/ {
        access_log off;
        log_not_found off;
        return 444;
    }

    location /media/downloadable/ {
        access_log off;
        log_not_found off;
        return 444;
    }

    location /media/import/ {
        access_log off;
        log_not_found off;
        return 444;
    }

    location /media/custom_options/ {
        access_log off;
        log_not_found off;
        return 444;
    }

    location /errors/ {
        location ~* .xml$ {
            access_log off;
            log_not_found off;
            return 444;
        }
    }

    location ~ ^/(index|get|static|errors/report|errors/404|errors/503|health_check).php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        include /etc/nginx/fastcgi_params;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        #BEGIN_FASTCGI_CACHE
        #END_FASTCGI_CACHE

        include /etc/nginx/nginx_limits.conf;

        if (-f $request_filename) {
            fastcgi_pass unix:__PHP_SOCKET__;
        }
    }
}

server {
